services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      # DNS
      - "53:53/tcp"
      - "53:53/udp"
      # Web UI - Setup wizard (initial setup only)
      - "3000:3000/tcp"
      # Web UI - Dashboard (after setup)
      - "80:80/tcp"
    volumes:
      - ./adguardhome/work:/opt/adguardhome/work
      - ./adguardhome/conf:/opt/adguardhome/conf
    networks:
      - adguard_net

networks:
  adguard_net:
    driver: bridge
